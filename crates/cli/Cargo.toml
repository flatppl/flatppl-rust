[package]
name = "flatppl-cli"
description = "The `flatppl` command-line driver: convert between FlatPPL and FlatPIR (more verbs as the toolchain grows)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# One driver binary; later capabilities (infer, lower, check) arrive as
# subcommands, heavy/optional ones behind cargo features. The library crates
# stay binary-free (they compile to wasm32 and link into PyO3/jlrs/cxx).
[[bin]]
name = "flatppl"
path = "src/main.rs"

[features]
# Verbs are opt-in cargo features so heavy capabilities never burden the
# default build; `infer` is light and rides along by default.
default = ["infer", "hs3"]
infer = ["dep:flatppl-infer"]
hs3 = ["dep:flatppl-hs3"]

[dependencies]
flatppl-core = { path = "../core" }
flatppl-syntax = { path = "../syntax" }
flatppl-flatpir = { path = "../flatpir" }
flatppl-infer = { path = "../infer", optional = true }
flatppl-hs3 = { path = "../hs3", optional = true }
clap = { workspace = true }
ariadne = { workspace = true }
